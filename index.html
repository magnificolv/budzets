<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Personīgais budžeta un finanšu trackeris">
    <meta name="theme-color" content="#13151f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Budžets">
    <link rel="apple-touch-icon" href="/budzets/icon-192.png">
    <link rel="manifest" href="/budzets/manifest.json">

    <title>Budžets - Personīgās Finanses</title>

    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Dark mode colors */
            --bg-base: #0f1117;
            --bg-surface: #1a1d27;
            --bg-elevated: #232736;
            --border-color: #2d3348;
            --text-primary: #e4e6f0;
            --text-secondary: #8b8fa3;
            --accent: #22d3ee;
            --accent-hover: #06b6d4;
            --success: #34d399;
            --danger: #f87171;
            --warning: #fbbf24;
            --sidebar-bg: #13151f;
            --transition: all 0.3s ease;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.6;
            overflow: hidden;
        }

        #root {
            width: 100%;
            height: 100%;
            display: flex;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            color: var(--text-primary);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            border-right: 1px solid var(--border-color);
        }

        .sidebar-header {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 40px;
            text-align: center;
            background: linear-gradient(135deg, var(--accent), #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .nav-menu {
            list-style: none;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-button {
            width: 100%;
            padding: 12px 14px;
            border: none;
            background-color: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            text-align: left;
            font-size: 14px;
            border-radius: 8px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .nav-button:hover {
            background-color: var(--bg-elevated);
            color: var(--text-primary);
        }

        .nav-button.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: var(--sidebar-bg);
            font-weight: 600;
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            margin-left: 280px;
            background-color: var(--bg-base);
            overflow-y: auto;
            height: 100vh;
        }

        .page-container {
            padding: 32px 40px;
            max-width: 1400px;
            margin: 0 auto;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 32px;
            color: var(--text-primary);
        }

        /* GRID LAYOUTS */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        /* CARDS */
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(10px);
            transition: var(--transition);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card:hover {
            border-color: var(--accent);
            box-shadow: 0 8px 16px rgba(34, 211, 238, 0.1);
        }

        .card-title {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .card-currency {
            font-size: 24px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        /* FORMS */
        .form-container {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 28px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-elevated);
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: var(--transition);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-secondary);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        /* BUTTONS */
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: var(--sidebar-bg);
            box-shadow: 0 4px 12px rgba(34, 211, 238, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(34, 211, 238, 0.3);
        }

        .btn-secondary {
            background-color: var(--bg-elevated);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: var(--border-color);
            border-color: var(--accent);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f87171, #ef4444);
            color: white;
            box-shadow: 0 4px 12px rgba(248, 113, 113, 0.2);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(248, 113, 113, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #10b981);
            color: var(--sidebar-bg);
            box-shadow: 0 4px 12px rgba(52, 211, 153, 0.2);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(52, 211, 153, 0.3);
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-icon {
            padding: 10px;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        /* TABLES */
        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--bg-surface);
        }

        th {
            background-color: var(--bg-elevated);
            padding: 14px;
            text-align: left;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 14px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 14px;
        }

        tr:hover {
            background-color: var(--bg-elevated);
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* BADGES */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .badge-primary {
            background-color: rgba(34, 211, 238, 0.15);
            color: var(--accent);
        }

        .badge-success {
            background-color: rgba(52, 211, 153, 0.15);
            color: var(--success);
        }

        .badge-danger {
            background-color: rgba(248, 113, 113, 0.15);
            color: var(--danger);
        }

        .badge-warning {
            background-color: rgba(251, 191, 36, 0.15);
            color: var(--warning);
        }

        /* CHARTS */
        .chart-container {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }

        .chart-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
        }

        /* MESSAGE NOTIFICATIONS */
        .message {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 16px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .message-success {
            background: linear-gradient(135deg, var(--success), #10b981);
            color: var(--sidebar-bg);
            box-shadow: 0 4px 12px rgba(52, 211, 153, 0.2);
        }

        .message-error {
            background: linear-gradient(135deg, var(--danger), #ef4444);
            color: white;
            box-shadow: 0 4px 12px rgba(248, 113, 113, 0.2);
        }

        /* CATEGORY BADGE */
        .category-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background-color: var(--bg-elevated);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
        }

        .category-emoji {
            font-size: 18px;
        }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            .sidebar {
                width: 200px;
                padding: 16px 12px;
            }

            .sidebar-header {
                font-size: 24px;
                margin-bottom: 24px;
            }

            .main-content {
                margin-left: 200px;
            }

            .page-container {
                padding: 24px 20px;
            }

            .grid-4 {
                grid-template-columns: repeat(2, 1fr);
            }

            .grid-3 {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                padding: 16px;
                flex-direction: row;
                align-items: center;
                position: static;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }

            .sidebar-header {
                margin-bottom: 0;
                font-size: 20px;
            }

            .nav-menu {
                flex-direction: row;
                gap: 4px;
                flex: 1;
                justify-content: center;
            }

            .nav-button {
                padding: 8px 12px;
                font-size: 12px;
            }

            .main-content {
                margin-left: 0;
                height: auto;
            }

            .page-container {
                padding: 20px;
            }

            .page-title {
                font-size: 24px;
                margin-bottom: 20px;
            }

            .grid-4,
            .grid-3,
            .grid-2 {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .message {
                right: 12px;
                left: 12px;
                top: auto;
                bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const {
            useState,
            useEffect,
            useMemo,
            useCallback,
            useRef
        } = React;

        // DEFAULT CATEGORIES AND SUBCATEGORIES
        const DEFAULT_CATEGORIES = {
            'Ēdiens': {
                icon: '🍔',
                subcategories: ['Pārtikas veikals', 'Restorāni/kafejnīcas', 'Ēdiens piegādē', 'Nekategorizēts'],
                type: 'expense'
            },
            'Transports': {
                icon: '🚗',
                subcategories: ['Degviela', 'Sabiedriskais transports', 'Taksometrs', 'Auto apkope', 'Nekategorizēts'],
                type: 'expense'
            },
            'Mājoklis': {
                icon: '🏠',
                subcategories: ['Īre/hipotēka', 'Komunālie', 'Remonts', 'Mēbeles', 'Nekategorizēts'],
                type: 'expense'
            },
            'Izklaide': {
                icon: '🎬',
                subcategories: ['Kino/teātris', 'Sporta klubs', 'Hobiji', 'Ceļojumi', 'Nekategorizēts'],
                type: 'expense'
            },
            'Veselība': {
                icon: '⚕️',
                subcategories: ['Ārsts', 'Medikamenti', 'Apdrošināšana', 'Nekategorizēts'],
                type: 'expense'
            },
            'Apģērbs': {
                icon: '👕',
                subcategories: ['Apavi', 'Drēbes', 'Aksesuāri', 'Nekategorizēts'],
                type: 'expense'
            },
            'Izglītība': {
                icon: '📚',
                subcategories: ['Kursi', 'Grāmatas', 'Abonementi', 'Nekategorizēts'],
                type: 'expense'
            },
            'Ienākumi': {
                icon: '💰',
                subcategories: ['Alga', 'Bonuss', 'Freelance', 'Citi ienākumi', 'Nekategorizēts'],
                type: 'income'
            },
            'Cits': {
                icon: '📦',
                subcategories: ['Dāvanas', 'Labdarība', 'Nekategorizēts'],
                type: 'expense'
            }
        };

        const CHART_COLORS = [
            '#22d3ee', '#34d399', '#fbbf24', '#f87171', '#a78bfa',
            '#fb7185', '#06b6d4', '#f97316', '#6366f1', '#14b8a6'
        ];

        // MAIN APP COMPONENT
        function BudgetApp() {
            const [currentTab, setCurrentTab] = useState('dashboard');
            const [transactions, setTransactions] = useState([]);
            const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
            const [savings, setSavings] = useState([]);
            const [message, setMessage] = useState(null);

            // Load data from localStorage on mount
            useEffect(() => {
                const savedTransactions = localStorage.getItem('budgets_transactions');
                const savedSavings = localStorage.getItem('budgets_savings');
                const savedCategories = localStorage.getItem('budgets_categories');

                if (savedTransactions) {
                    setTransactions(JSON.parse(savedTransactions));
                }
                if (savedSavings) {
                    setSavings(JSON.parse(savedSavings));
                }
                if (savedCategories) {
                    setCategories(JSON.parse(savedCategories));
                }

                // Register service worker
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('/budzets/sw.js').catch(err => {
                        console.warn('Service Worker registration failed:', err);
                    });
                }
            }, []);

            // Save transactions to localStorage
            useEffect(() => {
                localStorage.setItem('budgets_transactions', JSON.stringify(transactions));
            }, [transactions]);

            // Save savings to localStorage
            useEffect(() => {
                localStorage.setItem('budgets_savings', JSON.stringify(savings));
            }, [savings]);

            // Save categories to localStorage
            useEffect(() => {
                localStorage.setItem('budgets_categories', JSON.stringify(categories));
            }, [categories]);

            const showMessage = useCallback((text, type = 'success') => {
                setMessage({ text, type });
                setTimeout(() => setMessage(null), 3000);
            }, []);

            const addTransaction = useCallback((transaction) => {
                setTransactions(prev => [...prev, { ...transaction, id: Date.now() }]);
                showMessage('Darījums pievienots!', 'success');
            }, [showMessage]);

            const deleteTransaction = useCallback((id) => {
                setTransactions(prev => prev.filter(t => t.id !== id));
                showMessage('Darījums izdzēsts!', 'success');
            }, [showMessage]);

            const addCategory = useCallback((name, icon, subcategories, type) => {
                setCategories(prev => ({
                    ...prev,
                    [name]: { icon, subcategories, type }
                }));
                showMessage('Kategorija pievienota!', 'success');
            }, [showMessage]);

            const deleteCategory = useCallback((name) => {
                setCategories(prev => {
                    const updated = { ...prev };
                    delete updated[name];
                    return updated;
                });
                showMessage('Kategorija izdzēsta!', 'success');
            }, [showMessage]);

            const addSavingGoal = useCallback((goal) => {
                setSavings(prev => [...prev, { ...goal, id: Date.now() }]);
                showMessage('Ietaupījuma mērķis pievienots!', 'success');
            }, [showMessage]);

            const deleteSavingGoal = useCallback((id) => {
                setSavings(prev => prev.filter(s => s.id !== id));
                showMessage('Ietaupījuma mērķis izdzēsts!', 'success');
            }, [showMessage]);

            const handleExport = useCallback(() => {
                const data = {
                    transactions,
                    savings,
                    categories
                };
                const json = JSON.stringify(data, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `budzets-backup-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
                showMessage('Dati eksportēti!', 'success');
            }, [transactions, savings, categories, showMessage]);

            const handleImport = useCallback((data) => {
                try {
                    if (data.transactions) setTransactions(data.transactions);
                    if (data.savings) setSavings(data.savings);
                    if (data.categories) setCategories(data.categories);
                    showMessage('Dati importēti veiksmīgi!', 'success');
                } catch (error) {
                    showMessage('Kļūda importējot datus!', 'error');
                }
            }, [showMessage]);

            const handleClearAll = useCallback(() => {
                if (window.confirm('Vai jūs esat pārliecināts? Šo darbību nevar atsaukt!')) {
                    setTransactions([]);
                    setSavings([]);
                    setCategories(DEFAULT_CATEGORIES);
                    localStorage.removeItem('budgets_transactions');
                    localStorage.removeItem('budgets_savings');
                    localStorage.removeItem('budgets_categories');
                    showMessage('Visi dati izdzēsti!', 'success');
                }
            }, [showMessage]);

            return (
                <div className="app-container">
                    <nav className="sidebar">
                        <div className="sidebar-header">💵 Budžets</div>
                        <ul className="nav-menu">
                            { id: 'dashboard', label: 'Pārskats', icon: '📊' },
                                { id: 'add', label: 'Pievienot', icon: '➕' },
                                { id: 'transactions', label: 'Darījumi', icon: '📋' },
                                { id: 'categories', label: 'Kategorijas', icon: '🏷️' },
                                { id: 'charts', label: 'Grafiki', icon: '📈' },
                                { id: 'savings', label: 'Ietaupījumi', icon: '🎯' },
                                { id: 'settings', label: 'Iestatījumi', icon: '⚙️' }
                            ].map(nav => (
                                <li key={nav.id} className="nav-item">
                                    <button
                                        className={`nav-button ${currentTab === nav.id ? 'active' : ''}`}
                                        onClick={() => setCurrentTab(nav.id)}
                                    >
                                        <span>{nav.icon}</span>
                                        <span>{nav.label}</span>
                                    </button>
                                </li>
                            ))}
                        </ul>
                    </nav>

                    <div className="main-content">
                        <div className="page-container">
                            {currentTab === 'dashboard' && (
                                <Dashboard transactions={transactions} categories={categories} savings={savings} />
                            )}
                            {currentTab === 'add' && (
                                <AddTransaction onAdd={addTransaction} categories={categories} />
                            )}
                            {currentTab === 'transactions' && (
                                <Transactions transactions={transactions} onDelete={deleteTransaction} categories={categories} />
                            )}
                            {currentTab === 'categories' && (
                                <Categories
                                    categories={categories}
                                    onAdd={addCategory}
                                    onDelete={deleteCategory}
                                />
                            )}
                            {currentTab === 'charts' && (
                                <Charts transactions={transactions} categories={categories} />
                            )}
                            {currentTab === 'savings' && (
                                <Savings savings={savings} onAdd={addSavingGoal} onDelete={deleteSavingGoal} />
                            )}
                            {currentTab === 'settings' && (
                                <Settings onExport={handleExport} onImport={handleImport} onClearAll={handleClearAll} />
                            )}
                        </div>
                    </div>

                    {message && (
                        <div className={`message message-${message.type}`}>

                        </div>

        }

        // DASHBOARD COMPONENT
        function Dashboard({ transactions, categories, savings }) {
            const totalIncome = useMemo(() => {
                return transactions
                    .filter(t => t.type === 'income')
                    .reduce((sum, t) => sum + parseFloat(t.amount || 0), 0);
            }, [transactions]);

            const totalExpenses = useMemo(() => {
                return transactions
                    .filter(t => t.type === 'expense')
                    .reduce((sum, t) => sum + parseFloat(t.amount || 0), 0);
            }, [transactions]);

            const balance = useMemo(() => {
                return totalIncome - totalExpenses;
            }, [totalIncome, totalExpenses]);

            const totalSavings = useMemo(() => {
                return savings.reduce((sum, s) => sum + parseFloat(s.saved || 0), 0);
            }, [savings]);

            // Chart refs for Dashboard
            const dashboardPieRef = useRef(null);
            const dashboardBarRef = useRef(null);
            let dashboardPieChart = useRef(null);
            let dashboardBarChart = useRef(null);

            // Expense breakdown for pie chart
            const expenseBreakdown = useMemo(() => {
                const breakdown = {};
                transactions
                    .filter(t => t.type === 'expense')
                    .forEach(t => {
                        breakdown[t.category] = (breakdown[t.category] || 0) + parseFloat(t.amount || 0);
                    });
                return breakdown;
            }, [transactions]);

            // Initialize pie chart
            useEffect(() => {
                if (!dashboardPieRef.current) return;

                const labels = Object.keys(expenseBreakdown);
                const data = labels.map(cat => parseFloat(expenseBreakdown[cat].toFixed(2)));

                if (labels.length === 0) {
                    dashboardPieRef.current.style.display = 'none';
                    return;
                }

                dashboardPieRef.current.style.display = 'block';

                if (dashboardPieChart.current) {
                    dashboardPieChart.current.destroy();
                }

                dashboardPieChart.current = new Chart(dashboardPieRef.current, {
                    type: 'doughnut',
                    data: {
                        labels: labels.map(cat => `${categories[cat]?.icon || ''} ${cat}`),
                        datasets: [{
                            data,
                            backgroundColor: CHART_COLORS.slice(0, labels.length),
                            borderColor: '#232736',
                            borderWidth: 2,
                            borderRadius: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    color: '#e4e6f0',
                                    font: { size: 12, weight: 600 },
                                    padding: 16,
                                    boxWidth: 12,
                                    boxHeight: 12
                                }
                            }
                        }
                    }
                });
            }, [expenseBreakdown, categories]);

            // Monthly data for bar chart
            const monthlyData = useMemo(() => {
                const monthlyBreakdown = {};
                transactions.forEach(t => {
                    const yearMonth = t.date.substring(0, 7);
                    if (!monthlyBreakdown[yearMonth]) {
                        monthlyBreakdown[yearMonth] = { income: 0, expense: 0 };
                    }
                    if (t.type === 'income') {
                        monthlyBreakdown[yearMonth].income += parseFloat(t.amount || 0);
                    } else {
                        monthlyBreakdown[yearMonth].expense += parseFloat(t.amount || 0);
                    }
                });

                return Object.entries(monthlyBreakdown)
                    .sort(([a], [b]) => a.localeCompare(b))
                    .slice(-6)
                    .map(([month, data]) => ({
                        month: new Date(month + '-01').toLocaleDateString('lv-LV', { month: 'short', year: '2-digit' }),
                        Ienākumi: parseFloat(data.income.toFixed(2)),
                        Izdevumi: parseFloat(data.expense.toFixed(2))
                    }));
            }, [transactions]);

            // Initialize bar chart
            useEffect(() => {
                if (!dashboardBarRef.current) return;

                if (monthlyData.length === 0) {
                    dashboardBarRef.current.style.display = 'none';
                    return;
                }

                dashboardBarRef.current.style.display = 'block';

                if (dashboardBarChart.current) {
                    dashboardBarChart.current.destroy();
                }

                dashboardBarChart.current = new Chart(dashboardBarRef.current, {
                    type: 'bar',
                    data: {
                        labels: monthlyData.map(d => d.month),
                        datasets: [
                            {
                                label: 'Ienākumi',
                                data: monthlyData.map(d => d.Ienākumi),
                                backgroundColor: '#34d399',
                                borderRadius: 8,
                                borderSkipped: false
                            },
                            {
                                label: 'Izdevumi',
                                data: monthlyData.map(d => d.Izdevumi),
                                backgroundColor: '#f87171',
                                borderRadius: 8,
                                borderSkipped: false
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: {
                                labels: {
                                    color: '#e4e6f0',
                                    font: { size: 12, weight: 600 },
                                    padding: 16
                                }
                            }
                        },
                        scales: {
                            y: {
                                ticks: {
                                    color: '#8b8fa3',
                                    font: { size: 12, weight: 500 }
                                },
                                grid: {
                                    color: '#2d3348',
                                    drawBorder: false
                                }
                            },
                            x: {
                                ticks: {
                                    color: '#8b8fa3',
                                    font: { size: 12, weight: 500 }
                                },
                                grid: {
                                    display: false
                                }
                            }
                        }
                    }
                });
            }, [monthlyData]);

            return (
                <div>
                    <h1 className="page-title">📊 Pārskats</h1>

                    <div className="summary-grid">
                        <div className="card">
                            <div className="card-title">Ienākumi</div>
                            <div className="card-value">
                                <span className="card-currency">€</span>
                                <span>{totalIncome.toFixed(2)}</span>
                            </div>
                        </div>
                        <div className="card">
                            <div className="card-title">Izdevumi</div>
                            <div className="card-value">
                                <span className="card-currency">€</span>
                                <span>{totalExpenses.toFixed(2)}</span>
                            </div>
                        </div>
                        <div className="card">
                            <div className="card-title">Bilance</div>
                            <div className="card-value" style={{ color: balance >= 0 ? '#34d399' : '#f87171' }}>
                                <span className="card-currency">€</span>
                                <span>{balance.toFixed(2)}</span>
                            </div>
                        </div>
                        <div className="card">
                            <div className="card-title">Ietaupījumi</div>
                            <div className="card-value">
                                <span className="card-currency">€</span>
                                <span>{totalSavings.toFixed(2)}</span>
                            </div>
                        </div>
                    </div>

                    <div className="grid-2">
                        <div className="chart-container">
                            <div className="chart-title">💰 Izdevumi pa kategorijām</div>
                            <canvas ref={dashboardPieRef}></canvas>
                        </div>
                        <div className="chart-container">
                            <div className="chart-title">📈 Ienākumi un izdevumi</div>
                            <canvas ref={dashboardBarRef}></canvas>
                        </div>
                    </div>
                </div>
            );
        }

        // ADD TRANSACTION COMPONENT

        // TRANSACTIONS COMPONENT
        function Transactions({ transactions, onDelete, categories }) {
            const [sortField, setSortField] = useState('date');
            const [sortOrder, setSortOrder] = useState('desc');
            const [filterType, setFilterType] = useState('all');
            const [filterCategory, setFilterCategory] = useState('all');
            const [filterStartDate, setFilterStartDate] = useState('');
            const [filterEndDate, setFilterEndDate] = useState('');

            const filteredAndSortedTransactions = useMemo(() => {
                let filtered = transactions.filter(t => {
                    if (filterType !== 'all' && t.type !== filterType) return false;
                    if (filterCategory !== 'all' && t.category !== filterCategory) return false;
                    if (filterStartDate && t.date < filterStartDate) return false;
                    if (filterEndDate && t.date > filterEndDate) return false;
                    return true;
                });

                filtered.sort((a, b) => {
                    let aVal = a[sortField];
                    let bVal = b[sortField];
                    if (sortField === 'amount') {
                        aVal = parseFloat(aVal);
                        bVal = parseFloat(bVal);
                    }
                    const comparison = aVal < bVal ? -1 : aVal > bVal ? 1 : 0;
                    return sortOrder === 'desc' ? -comparison : comparison;
                });

                return filtered;
            }, [transactions, sortField, sortOrder, filterType, filterCategory, filterStartDate, filterEndDate]);

            const categoryOptions = Object.entries(categories)
                .filter(([_, data]) => filterType === 'all' || data.type === filterType)
                .map(([name, _]) => name);

            return (
                <div>
                    <h1 className="page-title">📋 Darījumi</h1>

                    <div className="form-container">
                        <h2 style={{ fontSize: '16px', fontWeight: '700', marginBottom: '20px', color: '#e4e6f0' }}>Filtri</h2>
                        <div className="form-row">
                            <div className="form-group">
                                <label>Tips</label>
                                <select value={filterType} onChange={(e) => setFilterType(e.target.value)}>
                                    <option value="all">Visi</option>
                                    <option value="income">Ienākumi</option>
                                    <option value="expense">Izdevumi</option>
                                </select>
                            </div>
                            <div className="form-group">
                                <label>Kategorija</label>
                                <select value={filterCategory} onChange={(e) => setFilterCategory(e.target.value)}>
                                    <option value="all">Visas</option>
                                    {categoryOptions.map(cat => (
                                        <option key={cat} value={cat}>{categories[cat]?.icon} {cat}</option>
                                    ))}
                                </select>
                            </div>
                        </div>
                        <div className="form-row">
                            <div className="form-group">
                                <label>No datuma</label>
                                <input
                                    type="date"
                                    value={filterStartDate}
                                    onChange={(e) => setFilterStartDate(e.target.value)}
                                />
                            </div>
                            <div className="form-group">
                                <label>Līdz datumam</label>
                                <input
                                    type="date"
                                    value={filterEndDate}
                                    onChange={(e) => setFilterEndDate(e.target.value)}
                                />
                            </div>
                        </div>
                    </div>

                    <div className="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th onClick={() => { setSortField('date'); setSortOrder(sortOrder === 'asc' ? 'desc' : 'asc'); }}>
                                        📅 Datums {sortField === 'date' && (sortOrder === 'asc' ? '↑' : '↓')}
                                    </th>
                                    <th>Kategorija</th>
                                    <th>Apakškategorija</th>
                                    <th>Apraksts</th>
                                    <th onClick={() => { setSortField('amount'); setSortOrder(sortOrder === 'asc' ? 'desc' : 'asc'); }}>
                                        💰 Summa {sortField === 'amount' && (sortOrder === 'asc' ? '↑' : '↓')}
                                    </th>
                                    <th>Tips</th>
                                    <th>Darbības</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filteredAndSortedTransactions.map(t => (
                                    <tr key={t.id}>
                                        <td>{new Date(t.date).toLocaleDateString('lv-LV')}</td>
                                        <td><span className="category-emoji">{categories[t.category]?.icon}</span> {t.category}</td>
                                        <td>{t.subcategory || '-'}</td>
                                        <td>{t.description || '-'}</td>
                                        <td style={{ fontWeight: '600', color: t.type === 'income' ? '#34d399' : '#f87171' }}>
                                            {t.type === 'income' ? '+' : '-'}€{parseFloat(t.amount).toFixed(2)}
                                        </td>
                                        <td>
                                            <span className={`badge badge-${t.type === 'income' ? 'success' : 'danger'}`}>
                                                {t.type === 'income' ? 'Ienākums' : 'Izdevums'}
                                            </span>
                                        </td>
                                        <td>
                                            <button
                                                className="btn btn-small btn-danger"
                                                onClick={() => onDelete(t.id)}
                                            >
                                                🗑️
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // CATEGORIES COMPONENT
        function Categories({ categories, onAdd, onDelete }) {
            const [showAddForm, setShowAddForm] = useState(false);

                name: '',

                    {showAddForm && (

                    <div className="grid-3">

        // CHARTS COMPONENT
        function Charts({ transactions, categories }) {
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');

            const filteredTransactions = useMemo(() => {
                return transactions.filter(t => {
                    if (startDate && t.date < startDate) return false;
                    if (endDate && t.date > endDate) return false;
                    return true;
                });
            }, [transactions, startDate, endDate]);

            const categoryData = useMemo(() => {
                const breakdown = {};
                filteredTransactions.forEach(t => {
                    if (t.type === 'expense') {
                        breakdown[t.category] = (breakdown[t.category] || 0) + parseFloat(t.amount || 0);
                    }
                });
                return Object.entries(breakdown).map(([name, value], idx) => ({
                    name,
                    value: parseFloat(value.toFixed(2)),
                    fill: CHART_COLORS[idx % CHART_COLORS.length]
                }));
            }, [filteredTransactions]);

            const monthlyData = useMemo(() => {
                const monthlyBreakdown = {};
                filteredTransactions.forEach(t => {
                    const yearMonth = t.date.substring(0, 7);
                    if (!monthlyBreakdown[yearMonth]) {
                        monthlyBreakdown[yearMonth] = { income: 0, expense: 0 };
                    }
                    if (t.type === 'income') {
                        monthlyBreakdown[yearMonth].income += parseFloat(t.amount || 0);
                    } else {
                        monthlyBreakdown[yearMonth].expense += parseFloat(t.amount || 0);
                    }
                });

                return Object.entries(monthlyBreakdown)
                    .sort(([a], [b]) => a.localeCompare(b))
                    .map(([month, data]) => ({
                        month: new Date(month + '-01').toLocaleDateString('lv-LV', { month: 'short', year: 'numeric' }),
                        Ienākumi: parseFloat(data.income.toFixed(2)),
                        Izdevumi: parseFloat(data.expense.toFixed(2))
                    }));
            }, [filteredTransactions]);

            const trendData = useMemo(() => {
                const dailyData = {};
                filteredTransactions.forEach(t => {
                    if (!dailyData[t.date]) {
                        dailyData[t.date] = { income: 0, expense: 0 };
                    }
                    if (t.type === 'income') {
                        dailyData[t.date].income += parseFloat(t.amount || 0);
                    } else {
                        dailyData[t.date].expense += parseFloat(t.amount || 0);
                    }
                });

                let cumulativeIncome = 0;
                let cumulativeExpense = 0;

                return Object.entries(dailyData)
                    .sort(([a], [b]) => a.localeCompare(b))
                    .map(([date, data]) => {
                        cumulativeIncome += data.income;
                        cumulativeExpense += data.expense;
                        return {
                            date: new Date(date).toLocaleDateString('lv-LV', { month: '2-digit', day: '2-digit' }),
                            Bilance: parseFloat((cumulativeIncome - cumulativeExpense).toFixed(2))
                        };
                    });
            }, [filteredTransactions]);

            // Chart refs for Charts component
            const chartsPagePieRef = useRef(null);
            const monthlyBarChartRef = useRef(null);
            const trendLineChartRef = useRef(null);
            let chartsPagePieChart = useRef(null);
            let monthlyBarChart = useRef(null);
            let trendLineChart = useRef(null);

            // Initialize pie chart for Charts page
            useEffect(() => {
                if (!chartsPagePieRef.current) return;

                const labels = categoryData.map(d => d.name);
                const data = categoryData.map(d => d.value);

                if (labels.length === 0) {
                    chartsPagePieRef.current.style.display = 'none';
                    return;
                }

                chartsPagePieRef.current.style.display = 'block';

                if (chartsPagePieChart.current) {
                    chartsPagePieChart.current.destroy();
                }

                chartsPagePieChart.current = new Chart(chartsPagePieRef.current, {
                    type: 'pie',
                    data: {
                        labels: labels.map(cat => `${categories[cat]?.icon || ''} ${cat}`),
                        datasets: [{
                            data,
                            backgroundColor: CHART_COLORS.slice(0, labels.length),
                            borderColor: '#232736',
                            borderWidth: 2,
                            borderRadius: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    color: '#e4e6f0',
                                    font: { size: 12, weight: 600 },
                                    padding: 16,
                                    boxWidth: 12,
                                    boxHeight: 12
                                }
                            }
                        }
                    }
                });
            }, [categoryData, categories]);

            // Initialize monthly bar chart
            useEffect(() => {
                if (!monthlyBarChartRef.current) return;

                if (monthlyData.length === 0) {
                    monthlyBarChartRef.current.style.display = 'none';
                    return;
                }

                monthlyBarChartRef.current.style.display = 'block';

                if (monthlyBarChart.current) {
                    monthlyBarChart.current.destroy();
                }

                monthlyBarChart.current = new Chart(monthlyBarChartRef.current, {
                    type: 'bar',
                    data: {
                        labels: monthlyData.map(d => d.month),
                        datasets: [
                            {
                                label: 'Ienākumi',
                                data: monthlyData.map(d => d.Ienākumi),
                                backgroundColor: '#34d399',
                                borderRadius: 8,
                                borderSkipped: false
                            },
                            {
                                label: 'Izdevumi',
                                data: monthlyData.map(d => d.Izdevumi),
                                backgroundColor: '#f87171',
                                borderRadius: 8,
                                borderSkipped: false
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: {
                                labels: {
                                    color: '#e4e6f0',
                                    font: { size: 12, weight: 600 },
                                    padding: 16
                                }
                            }
                        },
                        scales: {
                            y: {
                                ticks: {
                                    color: '#8b8fa3',
                                    font: { size: 12, weight: 500 }
                                },
                                grid: {
                                    color: '#2d3348',
                                    drawBorder: false
                                }
                            },
                            x: {
                                ticks: {
                                    color: '#8b8fa3',
                                    font: { size: 12, weight: 500 }
                                },
                                grid: {
                                    display: false
                                }
                            }
                        }
                    }
                });
            }, [monthlyData]);

            // Initialize trend line chart
            useEffect(() => {
                if (!trendLineChartRef.current) return;

                if (trendData.length === 0) {
                    trendLineChartRef.current.style.display = 'none';
                    return;
                }

                trendLineChartRef.current.style.display = 'block';

                if (trendLineChart.current) {
                    trendLineChart.current.destroy();
                }

                trendLineChart.current = new Chart(trendLineChartRef.current, {
                    type: 'line',
                    data: {
                        labels: trendData.map(d => d.date),
                        datasets: [{
                            label: 'Bilance',
                            data: trendData.map(d => d.Bilance),
                            borderColor: '#22d3ee',
                            backgroundColor: 'rgba(34, 211, 238, 0.1)',
                            borderWidth: 2,
                            pointRadius: 4,
                            pointBackgroundColor: '#22d3ee',
                            pointBorderColor: '#1a1d27',
                            pointBorderWidth: 2,
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: {
                                labels: {
                                    color: '#e4e6f0',
                                    font: { size: 12, weight: 600 },
                                    padding: 16
                                }
                            }
                        },
                        scales: {
                            y: {
                                ticks: {
                                    color: '#8b8fa3',
                                    font: { size: 12, weight: 500 }
                                },
                                grid: {
                                    color: '#2d3348',
                                    drawBorder: false
                                }
                            },
                            x: {
                                ticks: {
                                    color: '#8b8fa3',
                                    font: { size: 12, weight: 500 }
                                },
                                grid: {
                                    display: false
                                }
                            }
                        }
                    }
                });
            }, [trendData]);

            return (
                <div>
                    <h1 className="page-title">📈 Grafiki</h1>

                    <div className="form-container">
                        <h2 style={{ fontSize: '16px', fontWeight: '700', marginBottom: '16px', color: '#e4e6f0' }}>Perioda atlase</h2>
                        <div className="form-row">
                            <div className="form-group">
                                <label>No datuma</label>
                                <input
                                    type="date"
                                    value={startDate}
                                    onChange={(e) => setStartDate(e.target.value)}
                                />
                            </div>
                            <div className="form-group">
                                <label>Līdz datumam</label>
                                <input
                                    type="date"
                                    value={endDate}
                                    onChange={(e) => setEndDate(e.target.value)}
                                />
                            </div>
                        </div>
                    </div>

                    <div className="chart-container">
                        <div className="chart-title">💰 Izdevumi pa kategorijām</div>
                        <canvas ref={chartsPagePieRef}></canvas>
                    </div>

                    <div className="chart-container">
                        <div className="chart-title">📊 Ienākumi un izdevumi pa mēnešiem</div>
                        <canvas ref={monthlyBarChartRef}></canvas>
                    </div>

                    <div className="chart-container">
                        <div className="chart-title">📈 Bilances trends</div>
                        <canvas ref={trendLineChartRef}></canvas>
                    </div>
                </div>
            );
        }

        // SAVINGS COMPONENT
        function Savings({ savings, onAdd, onDelete }) {
            const [showAddForm, setShowAddForm] = useState(false);
            const [formData, setFormData] = useState({
                name: '',
                target: '',
                saved: ''
            });

            const handleAdd = () => {
                if (!formData.name.trim() || !formData.target) {
                    alert('Lūdzu aizpildiet visus laukus!');
                    return;
                }
                onAdd({
                    name: formData.name,
                    target: parseFloat(formData.target),
                    saved: parseFloat(formData.saved || 0)
                });
                setFormData({ name: '', target: '', saved: '' });
                setShowAddForm(false);
            };

            return (
                <div>
                    <h1 className="page-title">🎯 Ietaupījumi</h1>

                    <div style={{ marginBottom: '32px' }}>
                        <button
                            className="btn btn-primary"
                            onClick={() => setShowAddForm(!showAddForm)}
                        >
                            <span>+</span>
                            <span>Jauns mērķis</span>
                        </button>
                    </div>

                    {showAddForm && (
                        <div className="form-container">
                            <h2 style={{ fontSize: '16px', fontWeight: '700', marginBottom: '20px', color: '#e4e6f0' }}>Jauns ietaupījuma mērķis</h2>
                            <div className="form-group">
                                <label>Mērķa nosaukums</label>
                                <input
                                    type="text"
                                    placeholder="Piemēram: Brīvdienu ceļojums"
                                    value={formData.name}
                                    onChange={(e) => setFormData(prev => ({ ...prev, name: e.target.value }))}
                                />
                            </div>
                            <div className="form-row">
                                <div className="form-group">
                                    <label>Mērķa summa (€)</label>
                                    <input
                                        type="number"
                                        placeholder="0.00"
                                        step="0.01"
                                        value={formData.target}
                                        onChange={(e) => setFormData(prev => ({ ...prev, target: e.target.value }))}
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Jau uzkrāts (€)</label>
                                    <input
                                        type="number"
                                        placeholder="0.00"
                                        step="0.01"
                                        value={formData.saved}
                                        onChange={(e) => setFormData(prev => ({ ...prev, saved: e.target.value }))}
                                    />
                                </div>
                            </div>
                            <div className="btn-group">
                                <button className="btn btn-primary" onClick={handleAdd}>
                                    ✓ Pievienot
                                </button>
                                <button
                                    className="btn btn-secondary"
                                    onClick={() => setShowAddForm(false)}
                                >
                                    ✕ Atcelt
                                </button>
                            </div>
                        </div>
                    )}

                    <div className="grid-2">
                        {savings.map(s => {
                            const progress = (parseFloat(s.saved) / parseFloat(s.target)) * 100;
                            return (
                                <div key={s.id} className="card">
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'start', marginBottom: '16px' }}>
                                        <h3 style={{ fontSize: '16px', fontWeight: '700', color: '#e4e6f0' }}>{s.name}</h3>
                                        <button
                                            className="btn btn-small btn-danger"
                                            onClick={() => onDelete(s.id)}
                                        >
                                            🗑️
                                        </button>
                                    </div>
                                    <div style={{ marginBottom: '12px' }}>
                                        <div style={{ fontSize: '14px', color: '#8b8fa3', marginBottom: '8px' }}>
                                            €{parseFloat(s.saved).toFixed(2)} / €{parseFloat(s.target).toFixed(2)}
                                        </div>
                                        <div style={{
                                            width: '100%',
                                            height: '8px',
                                            backgroundColor: '#232736',
                                            borderRadius: '4px',
                                            overflow: 'hidden'
                                        }}>
                                            <div style={{
                                                height: '100%',
                                                width: `${Math.min(progress, 100)}%`,
                                                background: 'linear-gradient(90deg, #22d3ee, #06b6d4)',
                                                transition: 'width 0.3s ease'
                                            }} />
                                        </div>
                                    </div>
                                    <div style={{ fontSize: '14px', fontWeight: '700', color: '#34d399' }}>
                                        {Math.round(progress)}% uzkrāts
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {savings.length === 0 && (
                        <div className="card" style={{ textAlign: 'center', padding: '40px 24px' }}>
                            <p style={{ fontSize: '14px', color: '#8b8fa3' }}>
                                Nav izveidotu ietaupījuma mērķu. Nospiediet "Jauns mērķis", lai sāktu!
                            </p>
                        </div>
                    )}
                </div>
            );
        }

        // SETTINGS COMPONENT
        function Settings({ onExport, onImport, onClearAll }) {
            const fileInputRef = useRef(null);

            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        onImport(data);
                    } catch (err) {
                        alert('Kļūda: Nevarēja nolasīt failu. Pārliecinieties, ka tas ir derīgs JSON fails.');
                    }
                };
                reader.readAsText(file);
            };

            return (
                <div>
                    <h1 className="page-title">⚙️ Iestatījumi</h1>

                    <div className="form-container">
                        <h2 style={{ fontSize: '18px', fontWeight: '700', marginBottom: '20px', color: '#e4e6f0' }}>Datu vadība</h2>

                        <div style={{ marginBottom: '20px' }}>
                            <h3 style={{ fontSize: '14px', fontWeight: '700', marginBottom: '12px', color: '#e4e6f0' }}>📤 Eksportēt datus</h3>
                            <p style={{ fontSize: '13px', color: '#8b8fa3', marginBottom: '12px' }}>
                                Saglabājiet visus savus datus lokālā failā. To varat izmantot, lai izveidotu rezerves kopiju vai lai atvēltu datus uz citu ierīci.
                            </p>
                            <button className="btn btn-primary" onClick={onExport}>
                                <span>💾</span>
                                <span>Eksportēt kā JSON</span>
                            </button>
                        </div>

                        <div style={{
                            borderTop: '1px solid #2d3348',
                            paddingTop: '20px',
                            marginBottom: '20px'
                        }}>
                            <h3 style={{ fontSize: '14px', fontWeight: '700', marginBottom: '12px', color: '#e4e6f0' }}>📥 Importēt datus</h3>
                            <p style={{ fontSize: '13px', color: '#8b8fa3', marginBottom: '12px' }}>
                                Atlasiet iepriekš eksportētu JSON failu, lai atjaunotu savus datus.
                            </p>
                            <input
                                type="file"
                                ref={fileInputRef}
                                onChange={handleImport}
                                accept=".json"
                                style={{ display: 'none' }}
                            />
                            <button
                                className="btn btn-primary"
                                onClick={() => fileInputRef.current?.click()}
                            >
                                <span>📂</span>
                                <span>Atlasīt failu</span>
                            </button>
                        </div>

                        <div style={{
                            borderTop: '1px solid #2d3348',
                            paddingTop: '20px'
                        }}>
                            <h3 style={{ fontSize: '14px', fontWeight: '700', marginBottom: '12px', color: '#e4e6f0' }}>🗑️ Dzēst visus datus</h3>
                            <p style={{ fontSize: '13px', color: '#8b8fa3', marginBottom: '12px' }}>
                                Pastāvīgi izdzēsiet visus datus, kategorijas un ietaupījumus. Šo darbību nevar atsaukt!
                            </p>
                            <button className="btn btn-danger" onClick={onClearAll}>
                                <span>⚠️</span>
                                <span>Dzēst visus datus</span>
                            </button>
                        </div>
                    </div>

                    <div className="form-container">
                        <h2 style={{ fontSize: '18px', fontWeight: '700', marginBottom: '20px', color: '#e4e6f0' }}>Par lietotni</h2>
                        <div style={{ fontSize: '14px', color: '#e4e6f0', marginBottom: '16px' }}>
                            💵 <strong>Budžets v1.0.0</strong>
                        </div>
                        <p style={{ fontSize: '13px', color: '#8b8fa3', marginBottom: '16px' }}>
                            Personīgais budžeta un finanšu trackeris
                        </p>
                        <p style={{ fontSize: '13px', color: '#8b8fa3', marginBottom: '16px' }}>
                            📅 Izstrādāts: 2026-03-23
                        </p>
                        <p style={{ fontSize: '13px', color: '#8b8fa3', marginBottom: '16px' }}>
                            Izstrādāts ar ❤️
                        </p>
                        <a
                            href="https://github.com/magnificolv/budzets"
                            target="_blank"
                            rel="noopener noreferrer"
                            style={{
                                display: 'inline-flex',
                                alignItems: 'center',
                                gap: '8px',
                                color: '#22d3ee',
                                textDecoration: 'none',
                                fontSize: '14px',
                                fontWeight: '600',
                                padding: '8px 12px',
                                backgroundColor: 'rgba(34, 211, 238, 0.1)',
                                borderRadius: '6px',
                                border: '1px solid rgba(34, 211, 238, 0.2)',
                                transition: 'all 0.3s ease'
                            }}
                            onMouseEnter={(e) => {
                                e.target.style.backgroundColor = 'rgba(34, 211, 238, 0.2)';
                                e.target.style.borderColor = '#22d3ee';
                            }}
                            onMouseLeave={(e) => {
                                e.target.style.backgroundColor = 'rgba(34, 211, 238, 0.1)';
                                e.target.style.borderColor = 'rgba(34, 211, 238, 0.2)';
                            }}
                        >
                            🔗 GitHub repozitorijs
                        </a>
                        <p style={{ fontSize: '13px', color: '#8b8fa3', marginTop: '16px' }}>
                            Visas datas tiek saglabātas jūsu pārlūkprogrammā
                        </p>
                    </div>
                </div>
            );
        }

        // RENDER APP
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BudgetApp />);
    </script>
</body>
</html>
